worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ──────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    reset_timedout_connection on;
    client_body_timeout 12;
    send_timeout 10;

    # ── Gzip ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/vnd.apple.mpegurl
        text/css
        text/html
        text/plain
        text/xml;

    # ── HLS MIME types ───────────────────────────────────────────
    types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
        video/mp4 mp4 m4s;
        application/octet-stream key;
    }

    # ══════════════════════════════════════════════════════════════
    # Main Server (HTTP & HTTPS)
    # ══════════════════════════════════════════════════════════════
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        http2 on;
        server_name _;

        # ── SSL ──────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # ── Security headers (inherited by locations without add_header) ──
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ── CORS helper snippet ───────────────────────────────────
        # Repeated in location blocks below because nginx add_header
        # in a child context REPLACES parent add_header directives.

        # ══════════════════════════════════════════════════════════
        # HLS  content
        # ══════════════════════════════════════════════════════════
        location /hls/ {
            alias /var/www/hls/;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS, HEAD' always;
                add_header 'Access-Control-Allow-Headers' 'Origin,Content-Type,Accept,Authorization,X-Requested-With' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # CORS (must repeat — child add_header overrides parent)
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS, HEAD" always;
            add_header Access-Control-Allow-Headers "Origin,Content-Type,Accept,Authorization,X-Requested-With" always;
            add_header Access-Control-Max-Age 86400 always;

            # Cache: no-store for segments, short TTL for playlists
            set $hls_cc "no-cache, no-store, must-revalidate";
            if ($uri ~* \.m3u8$) {
                set $hls_cc "max-age=2, stale-while-revalidate=2";
            }
            add_header Cache-Control $hls_cc always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;

            # Byte-range support (LL-HLS partial segments)
            add_header Accept-Ranges "bytes" always;

            # Security
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
        }

        # ══════════════════════════════════════════════════════════
        # Encryption  keys
        # ══════════════════════════════════════════════════════════
        location /keys/ {
            alias /var/www/keys/;

            # CORS
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS, HEAD" always;
            add_header Access-Control-Allow-Headers "Origin,Content-Type,Accept,Authorization,X-Requested-With" always;

            # Cache
            add_header Cache-Control "no-cache, no-store" always;

            # Security
            add_header X-Content-Type-Options "nosniff" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ══════════════════════════════════════════════════════════
        # Web  demo  page  (inherits server-level security headers)
        # ══════════════════════════════════════════════════════════
        location / {
            root /var/www/web;
            index index.html;
            try_files $uri $uri/ =404;

            # CORS for the demo page
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ══════════════════════════════════════════════════════════
        # Health  check
        # ══════════════════════════════════════════════════════════
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }
}
