services:
  hls-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hls-server
    ports:
      - "8888:443"
    volumes:
      # Persist generated HLS content
      - ./hls:/var/www/hls
      # Persist generated certs
      - ./certs:/etc/nginx/certs
      # Persist encryption keys
      - ./keys:/var/www/keys
      # Web demo page (mounted for live editing)
      - ./web:/var/www/web
      # Source video (read-only)
      - ./download.mp4:/data/download.mp4:ro
    environment:
      - HLS_BASE_URL=https://localhost:8888
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
